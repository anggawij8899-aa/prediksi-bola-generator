<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Generator Prediksi Bola</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #333);
    color: #eee;
    padding: 20px;
  }
  h1 {
    text-align: center;
    color: gold;
    text-shadow: 2px 2px 5px #000;
  }
  textarea {
    width: 100%;
    height: 200px;
    margin-bottom: 20px;
    padding: 10px;
    font-size: 14px;
    background: #222;
    color: #fff;
    border: 1px solid gold;
  }
  button {
    background: gold;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin-right: 10px;
    font-weight: bold;
    box-shadow: 0 0 10px gold;
  }
  pre {
    background: #111;
    color: #0f0;
    padding: 15px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    border: 1px solid #444;
    border-radius: 8px;
  }
</style>
</head>
<body>
<h1>Dashboard Generator Prediksi Bola</h1>
<textarea id="inputText" placeholder="Tempel jadwal pertandingan di sini..."></textarea>
<button onclick="generateScript()">Generate Script HTML</button>
<button onclick="copyScript()">Copy All Script</button>
<h2>Output Script:</h2>
<pre id="output"></pre>

<script>
function generateScript() {
  const input = document.getElementById("inputText").value;
  const lines = input.split("\n").filter(line => line.trim() !== "");
  let scriptHTML = "";
  let currentLeague = "";

  lines.forEach(line => {
    if (!line.includes("WIB")) {
      if (currentLeague !== "") scriptHTML += "</table>\n";
      currentLeague = line.trim();
      scriptHTML += `<h3 style="color:lime;text-shadow:1px 1px 3px #000;text-align:center;margin:20px 0;font-size:22px;border-bottom:2px solid gold;padding-bottom:5px;'>${currentLeague}</h3>\n`;
      scriptHTML += "<table style='width:100%;border-collapse:collapse;margin-bottom:25px;border-radius:10px;overflow:hidden;background:linear-gradient(135deg,#1a1a1a,#333,#444);box-shadow:0 0 15px rgba(255,215,0,0.5);'>\n";
      scriptHTML += "<tr style='background:#222;color:gold;font-weight:bold;'><th style='border:1px solid #555;padding:8px;'>Waktu</th><th style='border:1px solid #555;padding:8px;'>Tim</th><th style='border:1px solid #555;padding:8px;'>Prediksi</th></tr>\n";
    } else {
      const parts = line.split(" ");
      const waktu = parts[0] + " " + parts[1] + " " + parts[2];
      const timA = parts.slice(3, parts.indexOf("vs")).join(" ");
      const timB = parts.slice(parts.indexOf("vs") + 1, parts.length - 2).join(" ");
      const skor = parts.slice(-2).join(" ");
      scriptHTML += `<tr style='border-bottom:1px solid #555;background:rgba(0,0,0,0.6);color:#eee;'>
        <td style='border:1px solid #555;padding:8px;'>${waktu}</td>
        <td style='border:1px solid #555;padding:8px;'>${timA} vs ${timB}</td>
        <td style='border:1px solid #555;padding:8px;color:lime;font-weight:bold;'>${skor}</td>
      </tr>\n`;
    }
  });

  scriptHTML += "</table>\n";
  document.getElementById("output").textContent = scriptHTML;
}
</script>
